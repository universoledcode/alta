# Monorepo: la app Next vive en nextjs_space/
# En Netlify UI: conecta el repo https://github.com/universoledcode/alta
#
# IMPORTANTE (si el build falla con P1012 DATABASE_URL):
# - Site settings → Environment variables → crea DATABASE_URL (misma cadena que en tu .env local).
# - El contexto debe incluir "Builds" (Netlify: disponible en builds y en runtime).
#
# IMPORTANTE (plugin Next.js):
# - En Build settings, deja "Publish directory" VACIO. Si pones "nextjs_space" ahi, rompe el deploy.
#   El plugin @netlify/plugin-nextjs define la salida correcta.
#
# Prisma db push en el build:
# - Muchas bases (ej. hosteddb / restringidas por IP) NO aceptan conexiones desde Netlify → P1001.
# - Por defecto NO corremos db push en CI. Aplica el esquema desde tu PC: yarn prisma db push
# - Opcional: si tu proveedor permite IPs de Netlify, variable RUN_PRISMA_DB_PUSH=true en Netlify
#   y el comando de abajo ejecutara db push en el build.

[build]
  base = "nextjs_space"
  command = "yarn install && yarn prisma generate && if [ \"$RUN_PRISMA_DB_PUSH\" = \"true\" ]; then yarn prisma db push; fi && yarn build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
